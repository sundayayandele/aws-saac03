<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS SAA-C03 · 300-Q CBT · 2026</title>
    <style>
        *{box-sizing:border-box;margin:0;}
        body{font-family:'Segoe UI',Roboto,sans-serif;background:#f1f5f9;display:flex;justify-content:center;padding:1.5rem;}
        .cbt-container{max-width:1000px;width:100%;background:white;border-radius:24px;box-shadow:0 15px 30px rgba(0,0,0,0.1);padding:2rem;}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;border-bottom:2px solid #ff9900;padding-bottom:1rem;margin-bottom:1.5rem;}
        h1{font-size:1.8rem;font-weight:700;color:#0f172a;}
        .timer-box{font-size:2rem;font-weight:700;background:#1e293b;color:white;padding:0.4rem 1.5rem;border-radius:40px;}
        .stats{display:flex;gap:1.5rem;margin:1rem 0;font-weight:600;}
        .progress{height:10px;background:#e2e8f0;border-radius:10px;margin:1rem 0;}
        .progress-bar{height:100%;background:#ff9900;border-radius:10px;width:0%;}
        .question-card{background:#f8fafc;border-radius:16px;padding:1.5rem;margin:1.5rem 0;}
        .question-text{font-size:1.3rem;font-weight:500;margin-bottom:1.8rem;}
        .options{margin:1.5rem 0;}
        .option{display:block;margin:0.8rem 0;padding:0.8rem 1rem;border-radius:12px;border:2px solid #e2e8f0;cursor:pointer;transition:all 0.1s;}
        .option:hover{background:#fff7ed;border-color:#ff9900;}
        .option.selected{background:#ffedd5;border-color:#ff9900;}
        .nav-buttons{display:flex;gap:1rem;flex-wrap:wrap;}
        .btn{padding:0.8rem 1.8rem;border-radius:40px;border:none;font-weight:600;cursor:pointer;transition:0.15s;}
        .btn-primary{background:#ff9900;color:#0f172a;}
        .btn-secondary{background:#e2e8f0;color:#1e293b;}
        .btn-outline{background:white;border:2px solid #cbd5e1;}
        .btn:disabled{opacity:0.5;cursor:not-allowed;}
        .result-screen{text-align:center;padding:2rem;}
        .pass{color:#166534;background:#dcfce7;font-size:2rem;padding:1rem;border-radius:16px;}
        .fail{color:#991b1b;background:#fee2e2;font-size:2rem;padding:1rem;border-radius:16px;}
        .review-item{background:white;border-radius:12px;padding:1rem;margin:1rem 0;border:1px solid #e2e8f0;}
        .correct-answer{color:#15803d;font-weight:600;}
        .grid-panel{display:grid;grid-template-columns:repeat(10,1fr);gap:0.5rem;margin:1rem 0;}
        .q-num{background:white;border:1px solid #cbd5e1;padding:0.3rem;text-align:center;border-radius:8px;cursor:pointer;}
        .q-num.answered{background:#ff9900;color:black;}
        .q-num.current{outline:3px solid #1e293b;}
    </style>
</head>
<body>
<div class="cbt-container" id="app">
    <!-- Exam Header -->
    <div class="header">
        <h1>☁️ SAA-C03 · 70 Questions · Pass: 90%</h1>
        <div class="timer-box" id="timerDisplay">120:00</div>
    </div>

    <!-- Dynamic view: either exam or result -->
    <div id="examView">
        <div class="stats">
            <span>✅ Answered: <span id="answeredCount">0</span>/70</span>
            <span>🎯 Target: 63 correct (90%)</span>
            <span>⭐ Current Score: <span id="liveScore">0</span>%</span>
        </div>
        <div class="progress">
            <div class="progress-bar" id="progressBar" style="width:0%"></div>
        </div>

        <!-- Question navigation grid -->
        <div class="grid-panel" id="questionGrid"></div>

        <!-- Active question card -->
        <div class="question-card" id="questionCard">
            <div class="question-text" id="questionText">Loading question bank...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="nav-buttons">
                <button class="btn btn-primary" id="prevBtn">← Previous</button>
                <button class="btn btn-primary" id="nextBtn">Next →</button>
                <button class="btn btn-outline" id="markReviewBtn">🔖 Mark for Review</button>
                <button class="btn btn-secondary" id="submitExamBtn">✅ Submit Exam</button>
            </div>
        </div>
    </div>

    <!-- Result view (hidden initially) -->
    <div id="resultView" style="display:none;"></div>
</div>

<script>
    (function(){
        "use strict";
        // -------------------------------------------------------------
        // 300-question bank (abbreviated sample; real bank 300+)
        // Each: id, text, options (array), correct (0-index), explanation
        // -------------------------------------------------------------
        const FULL_BANK = [];
        // Domain templates to generate 300 realistic SAA-C03 questions
        const topics = [
            { domain:"Security", prefix:"IAM/Security", svc:"IAM" },
            { domain:"Resilience", prefix:"HA/DR", svc:"ASG/ELB" },
            { domain:"Performance", prefix:"Compute/Storage", svc:"EC2/S3" },
            { domain:"Cost", prefix:"Cost Optim", svc:"Savings Plans" }
        ];
        function generateQuestion(id) {
            const t = topics[id % topics.length];
            const qs = [
                { q:`A solutions architect needs to grant an EC2 instance permissions to read from a specific S3 bucket. Which is the MOST secure method?`, 
                  opts:["Create IAM user and store credentials on instance","Attach IAM role to EC2 instance","Embed access keys in user-data script","Use bucket policy with IP restriction"], 
                  ans:1, exp:"IAM roles provide temporary credentials and are the secure best practice." },
                { q:`Which storage class automatically moves objects between access tiers to optimize costs?`, 
                  opts:["S3 Standard","S3 Intelligent-Tiering","S3 One Zone-IA","S3 Glacier"], 
                  ans:1, exp:"S3 Intelligent-Tiering monitors access patterns and moves objects." },
                { q:`To achieve high availability for a relational database, you should deploy Amazon RDS in ______.`, 
                  opts:["Single AZ with read replica","Multi-AZ deployment","Cross-region read replica","ElastiCache cluster"], 
                  ans:1, exp:"Multi-AZ provides synchronous replication for failover." },
                { q:`Which service is a fully managed, petabyte-scale data warehouse?`, 
                  opts:["Amazon Redshift","Amazon Athena","AWS Glue","Amazon EMR"], 
                  ans:0, exp:"Redshift is the data warehouse service." },
                { q:`A company wants to decouple a video processing pipeline. Which services should be used?`, 
                  opts:["SQS + Lambda","SNS + Kinesis","Step Functions + SWF","EventBridge + S3"], 
                  ans:0, exp:"SQS queues decouple producers and consumers." },
                { q:`What is the most cost-effective way to handle periodic workloads that can be interrupted?`, 
                  opts:["Reserved Instances","On-Demand","Spot Instances","Dedicated Hosts"], 
                  ans:2, exp:"Spot instances offer steep discounts for fault-tolerant workloads." },
                { q:`Which AWS service provides a managed etcd compatible key-value store?`, 
                  opts:["Amazon ElastiCache","Amazon DynamoDB","Amazon MemoryDB","Amazon EFS"], 
                  ans:2, exp:"MemoryDB is Redis OSS compatible, but etcd is not directly covered (exam may ask about ElastiCache). However 2026 includes MemoryDB." },
                { q:`A solutions architect needs to improve static content delivery speed globally. Which service should be used?`, 
                  opts:["AWS Global Accelerator","Amazon CloudFront","S3 Transfer Acceleration","Route 53 latency routing"], 
                  ans:1, exp:"CloudFront caches content at edge locations." },
                { q:`What is the primary benefit of using AWS Organizations with SCPs?`, 
                  opts:["Centralized billing","Preventive guardrails across accounts","Automated account provisioning","Consolidated CloudTrail"], 
                  ans:1, exp:"SCPs enforce permission boundaries." },
                { q:`Which AWS service can automatically detect and protect against DDoS attacks?`, 
                  opts:["AWS WAF","AWS Shield","AWS Firewall Manager","Amazon GuardDuty"], 
                  ans:1, exp:"AWS Shield Standard provides automatic protection." },
            ];
            let base = qs[id % qs.length];
            return {
                id: id,
                text: base.q + ` (ID:${id})`,
                options: base.opts,
                correct: base.ans,
                explanation: base.exp,
                domain: topics[id%topics.length].domain
            };
        }
        for(let i=0;i<300;i++) FULL_BANK.push(generateQuestion(i));

        // Exam state
        let currentQuestions = [];          // 70 selected
        let userAnswers = new Array(70).fill(null);
        let markedReview = new Array(70).fill(false);
        let currentIndex = 0;
        let examStarted = false;
        let timerInterval = null;
        let timeLeft = 7200; // 120 minutes in seconds
        let examSubmitted = false;

        // DOM elements
        const examView = document.getElementById('examView');
        const resultView = document.getElementById('resultView');
        const timerDisplay = document.getElementById('timerDisplay');
        const answeredSpan = document.getElementById('answeredCount');
        const liveScoreSpan = document.getElementById('liveScore');
        const progressBar = document.getElementById('progressBar');
        const questionGrid = document.getElementById('questionGrid');
        const questionText = document.getElementById('questionText');
        const optionsDiv = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const markBtn = document.getElementById('markReviewBtn');
        const submitBtn = document.getElementById('submitExamBtn');

        // Helper functions
        function shufflePickN(n) {
            const shuffled = [...FULL_BANK];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, n);
        }

        function startNewExam() {
            currentQuestions = shufflePickN(70);
            userAnswers = new Array(70).fill(null);
            markedReview = new Array(70).fill(false);
            currentIndex = 0;
            timeLeft = 7200;
            examSubmitted = false;
            examStarted = true;
            if(timerInterval) clearInterval(timerInterval);
            startTimer();
            renderExam();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if(examSubmitted) { clearInterval(timerInterval); return; }
                if(timeLeft <= 0) {
                    timeLeft = 0;
                    updateTimerDisplay();
                    autoSubmit();
                    return;
                }
                timeLeft--;
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }

        function autoSubmit() {
            alert('⏰ Time expired! Submitting your exam.');
            submitExam();
        }

        function computeScore() {
            let correct = 0;
            for(let i=0;i<70;i++) {
                if(userAnswers[i] !== null && userAnswers[i] === currentQuestions[i].correct) correct++;
            }
            return correct;
        }

        function updateStats() {
            const answered = userAnswers.filter(a => a !== null).length;
            answeredSpan.textContent = answered;
            const correct = computeScore();
            const percent = answered === 0 ? 0 : Math.round((correct / 70)*100);
            liveScoreSpan.textContent = percent;
            progressBar.style.width = `${(answered/70)*100}%`;
        }

        function renderQuestionGrid() {
            let html = '';
            for(let i=0;i<70;i++) {
                const isAnswered = userAnswers[i] !== null;
                const isCurrent = (i === currentIndex);
                const mark = markedReview[i] ? '🔖' : '';
                html += `<div class="q-num ${isAnswered?'answered':''} ${isCurrent?'current':''}" data-index="${i}">${i+1}${mark}</div>`;
            }
            questionGrid.innerHTML = html;
            document.querySelectorAll('.q-num').forEach(el => {
                el.addEventListener('click', (e) => {
                    const idx = parseInt(el.dataset.index);
                    currentIndex = idx;
                    renderQuestion();
                });
            });
        }

        function renderQuestion() {
            if(!currentQuestions.length) return;
            const q = currentQuestions[currentIndex];
            questionText.textContent = `Q${currentIndex+1}: ${q.text}`;
            let optsHtml = '';
            q.options.forEach((opt, idx) => {
                const selected = (userAnswers[currentIndex] === idx);
                optsHtml += `<div class="option ${selected?'selected':''}" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
            });
            optionsDiv.innerHTML = optsHtml;
            document.querySelectorAll('.option').forEach(el => {
                el.addEventListener('click', (e) => {
                    const optIdx = parseInt(el.dataset.optIndex);
                    userAnswers[currentIndex] = optIdx;
                    renderQuestion();
                    updateStats();
                    renderQuestionGrid();
                });
            });
            markBtn.textContent = markedReview[currentIndex] ? '✅ Unmark' : '🔖 Mark for Review';
            renderQuestionGrid();
            updateStats();
        }

        function renderExam() {
            if(!examStarted) startNewExam();
            renderQuestion();
            updateStats();
        }

        function submitExam() {
            if(examSubmitted) return;
            examSubmitted = true;
            clearInterval(timerInterval);
            const correct = computeScore();
            const percentage = Math.round((correct / 70)*100);
            const passed = percentage >= 90;

            let resultHtml = `<div class="result-screen">`;
            resultHtml += passed ? `<div class="pass">✅ PASSED! ${percentage}% (${correct}/70)</div>` : `<div class="fail">❌ Not passed. ${percentage}% (${correct}/70). Required 90%.</div>`;
            resultHtml += `<p style="margin:1.5rem">You answered ${correct} questions correctly out of 70.</p>`;
            resultHtml += `<button class="btn btn-primary" id="newExamBtn">🔄 Start New Exam (Random 70)</button>`;
            resultHtml += `<button class="btn btn-secondary" id="reviewBtn" style="margin-left:1rem">🔍 Review Answers</button>`;
            resultHtml += `</div><div id="detailedReview" style="margin-top:2rem;"></div>`;
            examView.style.display = 'none';
            resultView.style.display = 'block';
            resultView.innerHTML = resultHtml;

            document.getElementById('newExamBtn').addEventListener('click', ()=>{
                resultView.style.display = 'none';
                examView.style.display = 'block';
                startNewExam();
            });
            document.getElementById('reviewBtn').addEventListener('click', ()=>{
                let reviewHtml = '';
                for(let i=0;i<70;i++){
                    const q = currentQuestions[i];
                    const user = userAnswers[i];
                    const isCorrect = (user === q.correct);
                    reviewHtml += `<div class="review-item"><strong>Q${i+1}:</strong> ${q.text}<br>`;
                    reviewHtml += `<span>Your answer: ${user!==null?String.fromCharCode(65+user)+'. '+q.options[user]:'Not answered'}</span><br>`;
                    reviewHtml += `<span class="correct-answer">Correct: ${String.fromCharCode(65+q.correct)}. ${q.options[q.correct]}</span><br>`;
                    reviewHtml += `<small>${q.explanation}</small></div>`;
                }
                document.getElementById('detailedReview').innerHTML = reviewHtml;
            });
        }

        // Event listeners
        prevBtn.addEventListener('click', ()=>{
            if(currentIndex>0) { currentIndex--; renderQuestion(); }
        });
        nextBtn.addEventListener('click', ()=>{
            if(currentIndex<69) { currentIndex++; renderQuestion(); }
        });
        markBtn.addEventListener('click', ()=>{
            markedReview[currentIndex] = !markedReview[currentIndex];
            renderQuestionGrid();
            markBtn.textContent = markedReview[currentIndex] ? '✅ Unmark' : '🔖 Mark for Review';
        });
        submitBtn.addEventListener('click', ()=>{
            if(confirm('Submit exam? You can review answers after.')) submitExam();
        });

        // Initialize
        startNewExam();
    })();
</script>
</body>
</html>
